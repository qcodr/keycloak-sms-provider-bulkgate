version: 2
updates:
  # Gradle dependencies (build.gradle.kts + version properties in gradle.properties).
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # jakarta.ws.rs-api is provided by Keycloak at runtime (3.1 / Jakarta EE 10);
      # don't drift the compileOnly API ahead of what the server ships.
      - dependency-name: "jakarta.ws.rs:jakarta.ws.rs-api"
        update-types: ["version-update:semver-major"]
    groups:
      keycloak:
        patterns:
          - "org.keycloak:*"
      test-and-analysis:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
          - "org.wiremock*"
          - "org.testcontainers*"
          - "com.github.dasniko*"
          - "org.htmlunit*"
          - "org.slf4j*"
          - "com.google.errorprone*"
          - "com.h3xstream.findsecbugs*"

  # GitHub Actions used by the CI / release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]

  # Container images (docker-compose.yml: Keycloak + WireMock).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(docker)"
