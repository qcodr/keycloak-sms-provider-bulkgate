name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      # `build` runs spotlessCheck, Error Prone (compile), SpotBugs/FindSecBugs,
      # the unit/integration tests, and the shaded provider jar.
      - run: ./gradlew build --no-daemon --stacktrace
      - name: Upload analysis & test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: build/reports/

  e2e:
    name: End-to-end (Keycloak + mocked BulkGate)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      # GitHub-hosted runners ship Docker, so Testcontainers works out of the box.
      - run: ./gradlew e2eTest --no-daemon --stacktrace
      - name: Upload e2e reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: build/reports/tests/e2eTest/
