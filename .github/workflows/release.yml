name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish the provider jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # `build` runs spotlessCheck, Error Prone, SpotBugs/FindSecBugs, the
      # unit/integration tests, and the shaded provider jar.
      - name: Build
        run: ./gradlew build -Pversion="$VERSION" --no-daemon --stacktrace

      - name: Generate checksums
        working-directory: build/libs
        run: sha256sum *.jar > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            build/libs/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
